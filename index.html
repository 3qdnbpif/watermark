<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片加水印工具</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .main {
      padding: 25px;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 25px;
    }
    .preview {
      max-width: 100%;
      max-height: 550px;
      border: 3px solid #eee;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .controls {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #eee;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    textarea, input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    input[type="range"] {
      width: 100%;
    }
    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-primary { background: #0066ff; color: white; }
    .btn-primary:hover { background: #0052cc; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    footer {
      text-align: center;
      padding: 15px;
      color: #666;
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📸 圖片加水印工具</h1>
      <p>支援多行文字 + 自定義位置</p>
    </header>

    <div class="main">
      <div class="preview-area">
        <input type="file" id="upload" accept="image/*" style="margin-bottom:15px;">
        <img id="preview" class="preview" src="" alt="預覽圖片">
      </div>

      <div class="controls">
        <label>水印文字（支援多行）</label>
        <textarea id="text" rows="3" placeholder="第一行&#10;第二行">© 你的名字&#10;2026</textarea>

        <label>字體大小 <span id="sizeValue">42</span>px</label>
        <input type="range" id="size" min="12" max="150" value="42">

        <label>文字顏色</label>
        <input type="color" id="color" value="#ffffff">

        <label>透明度 <span id="opacityValue">70</span>%</label>
        <input type="range" id="opacity" min="10" max="100" value="70">

        <label>位置模式</label>
        <select id="positionMode">
          <option value="preset">預設位置</option>
          <option value="custom">自定義座標</option>
        </select>

        <!-- 預設位置 -->
        <div id="presetGroup">
          <label>預設位置</label>
          <select id="presetPosition">
            <option value="bottom-right">右下角</option>
            <option value="bottom-left">左下角</option>
            <option value="top-right">右上角</option>
            <option value="top-left">左上角</option>
            <option value="center">正中間</option>
          </select>
        </div>

        <!-- 自定義座標 -->
        <div id="customGroup" style="display:none;">
          <div class="row">
            <div>
              <label>X 座標 (px)</label>
              <input type="number" id="customX" value="100" min="0">
            </div>
            <div>
              <label>Y 座標 (px)</label>
              <input type="number" id="customY" value="100" min="0">
            </div>
          </div>
        </div>

        <label>旋轉角度 <span id="rotationValue">0</span>°</label>
        <input type="range" id="rotation" min="-45" max="45" value="0">

        <button class="btn-primary" id="applyBtn">套用水印（預覽）</button>
        <button class="btn-success" id="downloadBtn">💾 下載水印後圖片</button>
      </div>
    </div>

    <footer>
      純前端工具 • 所有處理喺瀏覽器完成
    </footer>
  </div>

  <script>
    const upload = document.getElementById('upload');
    const previewImg = document.getElementById('preview');
    const textArea = document.getElementById('text');
    const sizeSlider = document.getElementById('size');
    const sizeValue = document.getElementById('sizeValue');
    const colorInput = document.getElementById('color');
    const opacitySlider = document.getElementById('opacity');
    const opacityValue = document.getElementById('opacityValue');
    const rotationSlider = document.getElementById('rotation');
    const rotationValue = document.getElementById('rotationValue');
    const positionMode = document.getElementById('positionMode');
    const presetGroup = document.getElementById('presetGroup');
    const customGroup = document.getElementById('customGroup');
    const presetPosition = document.getElementById('presetPosition');
    const customX = document.getElementById('customX');
    const customY = document.getElementById('customY');

    const applyBtn = document.getElementById('applyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let originalImage = null;
    let currentWatermarked = null;

    // 更新數值顯示
    sizeSlider.oninput = () => sizeValue.textContent = sizeSlider.value;
    opacitySlider.oninput = () => opacityValue.textContent = opacitySlider.value;
    rotationSlider.oninput = () => rotationValue.textContent = rotationSlider.value;

    // 切換位置模式
    positionMode.addEventListener('change', () => {
      if (positionMode.value === 'preset') {
        presetGroup.style.display = 'block';
        customGroup.style.display = 'none';
      } else {
        presetGroup.style.display = 'none';
        customGroup.style.display = 'block';
      }
      if (originalImage) applyWatermark();
    });

    // 上傳圖片
    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        previewImg.src = event.target.result;
        originalImage = new Image();
        originalImage.onload = () => applyWatermark();
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function applyWatermark() {
      if (!originalImage) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      ctx.drawImage(originalImage, 0, 0);

      const lines = textArea.value.split('\n');
      const fontSize = parseInt(sizeSlider.value);
      const opacity = parseInt(opacitySlider.value) / 100;
      const color = colorInput.value;
      const rotation = parseInt(rotationSlider.value);

      ctx.font = `bold ${fontSize}px Arial`;
      ctx.fillStyle = color;
      ctx.globalAlpha = opacity;
      ctx.textBaseline = 'top';

      const lineHeight = fontSize * 1.2;
      let startX, startY;

      if (positionMode.value === 'preset') {
        const textWidth = Math.max(...lines.map(line => ctx.measureText(line).width));
        const padding = 40;

        switch(presetPosition.value) {
          case 'top-left':    startX = padding; startY = padding; break;
          case 'top-right':   startX = canvas.width - textWidth - padding; startY = padding; break;
          case 'bottom-left': startX = padding; startY = canvas.height - padding - lineHeight * (lines.length - 1); break;
          case 'bottom-right':startX = canvas.width - textWidth - padding; startY = canvas.height - padding - lineHeight * (lines.length - 1); break;
          case 'center':
            startX = (canvas.width - textWidth) / 2;
            startY = (canvas.height - lineHeight * lines.length) / 2;
            break;
        }
      } else {
        startX = parseInt(customX.value) || 100;
        startY = parseInt(customY.value) || 100;
      }

      // 繪製多行文字
      lines.forEach((line, index) => {
        const y = startY + index * lineHeight;
        if (rotation !== 0) {
          ctx.save();
          ctx.translate(startX, y);
          ctx.rotate(rotation * Math.PI / 180);
          ctx.fillText(line, 0, 0);
          ctx.restore();
        } else {
          ctx.fillText(line, startX, y);
        }
      });

      currentWatermarked = canvas.toDataURL('image/jpeg', 0.92);
      previewImg.src = currentWatermarked;
    }

    applyBtn.addEventListener('click', applyWatermark);
    downloadBtn.addEventListener('click', () => {
      if (!currentWatermarked) return alert('請先上傳圖片並套用水印');
      const link = document.createElement('a');
      link.download = 'watermarked-image.jpg';
      link.href = currentWatermarked;
      link.click();
    });

    // 即時更新
    document.querySelectorAll('input, select, textarea').forEach(el => {
      el.addEventListener('input', () => {
        if (originalImage) applyWatermark();
      });
    });
  </script>
</body>
</html>
