<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片加水印工具</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .main {
      padding: 25px;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 25px;
    }
    .preview {
      max-width: 100%;
      max-height: 550px;
      border: 3px solid #eee;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .controls {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #eee;
    }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    textarea, input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
    input[type="range"] { width: 100%; }
    button {
      padding: 10px 14px;
      margin: 5px 3px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-quick { background: #e0e0e0; color: #333; }
    .btn-quick:hover { background: #ccc; }
    .btn-primary { background: #0066ff; color: white; }
    .btn-primary:hover { background: #0052cc; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    footer { text-align: center; padding: 15px; color: #666; font-size: 14px; }
    @media (max-width: 768px) { .main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>📸 圖片加水印工具</h1><p>支援多行 + 日期時間 + 快速輸入</p></header>

    <div class="main">
      <div>
        <input type="file" id="upload" accept="image/*" style="margin-bottom:15px;">
        <img id="preview" class="preview" src="" alt="預覽圖片">
      </div>

      <div class="controls">
        <label>水印文字（支援多行）</label>
        <textarea id="text" rows="4" placeholder="輸入水印文字...">© 你的名字</textarea>

        <label>快速加入日期時間</label>
        <div>
          <button class="btn-quick" id="btnYYMMDD">YYMMDD</button>
          <button class="btn-quick" id="btnFullDate">YYMMDD h시</button>
          <button class="btn-quick" id="btnCustom">yyddmm h시</button>
        </div>

        <label>字體大小 <span id="sizeValue">42</span>px</label>
        <input type="range" id="size" min="12" max="150" value="42">

        <label>文字顏色</label><input type="color" id="color" value="#ffffff">

        <label>透明度 <span id="opacityValue">70</span>%</label>
        <input type="range" id="opacity" min="10" max="100" value="70">

        <label>位置模式</label>
        <select id="positionMode">
          <option value="preset">預設位置</option>
          <option value="custom">自定義座標</option>
        </select>

        <div id="presetGroup">
          <label>預設位置</label>
          <select id="presetPosition">
            <option value="bottom-right">右下角</option>
            <option value="bottom-left">左下角</option>
            <option value="top-right">右上角</option>
            <option value="top-left">左上角</option>
            <option value="center">正中間</option>
          </select>
        </div>

        <div id="customGroup" style="display:none;">
          <div class="row">
            <div><label>X 座標 (px)</label><input type="number" id="customX" value="100"></div>
            <div><label>Y 座標 (px)</label><input type="number" id="customY" value="100"></div>
          </div>
        </div>

        <label>旋轉角度 <span id="rotationValue">0</span>°</label>
        <input type="range" id="rotation" min="-45" max="45" value="0">

        <button class="btn-primary" id="applyBtn">套用水印（預覽）</button>
        <button class="btn-success" id="downloadBtn">💾 下載水印後圖片</button>
      </div>
    </div>
    <footer>純前端工具 • 所有處理喺你瀏覽器完成</footer>
  </div>

  <script>
    const upload = document.getElementById('upload');
    const previewImg = document.getElementById('preview');
    const textArea = document.getElementById('text');
    const sizeSlider = document.getElementById('size');
    const sizeValue = document.getElementById('sizeValue');
    const colorInput = document.getElementById('color');
    const opacitySlider = document.getElementById('opacity');
    const opacityValue = document.getElementById('opacityValue');
    const rotationSlider = document.getElementById('rotation');
    const rotationValue = document.getElementById('rotationValue');
    const positionMode = document.getElementById('positionMode');
    const presetGroup = document.getElementById('presetGroup');
    const customGroup = document.getElementById('customGroup');
    const presetPosition = document.getElementById('presetPosition');
    const customX = document.getElementById('customX');
    const customY = document.getElementById('customY');
    const applyBtn = document.getElementById('applyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let originalImage = null;
    let currentWatermarked = null;

    sizeSlider.oninput = () => sizeValue.textContent = sizeSlider.value;
    opacitySlider.oninput = () => opacityValue.textContent = opacitySlider.value;
    rotationSlider.oninput = () => rotationValue.textContent = rotationSlider.value;

    positionMode.addEventListener('change', () => {
      presetGroup.style.display = positionMode.value === 'preset' ? 'block' : 'none';
      customGroup.style.display = positionMode.value === 'custom' ? 'block' : 'none';
      if (originalImage) applyWatermark();
    });

    // 日期功能
    function getCurrentDate() {
      const now = new Date();
      const yy = String(now.getFullYear()).slice(2);
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hour = String(now.getHours()).padStart(2, '0');
      return { yy, mm, dd, hour };
    }

    document.getElementById('btnYYMMDD').onclick = () => { 
      const d = getCurrentDate(); textArea.value += `\n${d.yy}${d.mm}${d.dd}`; if(originalImage) applyWatermark(); 
    };
    document.getElementById('btnFullDate').onclick = () => { 
      const d = getCurrentDate(); textArea.value += `\n${d.yy}${d.mm}${d.dd} ${d.hour}시`; if(originalImage) applyWatermark(); 
    };
    document.getElementById('btnCustom').onclick = () => { 
      const d = getCurrentDate(); textArea.value += `\n${d.yy}${d.dd}${d.mm} ${d.hour}시`; if(originalImage) applyWatermark(); 
    };

    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        previewImg.src = event.target.result;
        originalImage = new Image();
        originalImage.onload = () => applyWatermark();
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function applyWatermark() {
      if (!originalImage) return;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      ctx.drawImage(originalImage, 0, 0);

      const lines = textArea.value.split('\n').filter(l => l.trim());
      const fontSize = parseInt(sizeSlider.value);
      const opacity = parseInt(opacitySlider.value) / 100;
      const color = colorInput.value;
      const rotation = parseInt(rotationSlider.value);

      ctx.font = `bold ${fontSize}px Arial`;
      ctx.fillStyle = color;
      ctx.globalAlpha = opacity;
      ctx.textBaseline = 'top';

      const lineHeight = fontSize * 1.25;
      let startX = 100, startY = 100;

      if (positionMode.value === 'preset') {
        const maxWidth = Math.max(...lines.map(l => ctx.measureText(l).width));
        const padding = 40;
        switch(presetPosition.value) {
          case 'top-left': startX = padding; startY = padding; break;
          case 'top-right': startX = canvas.width - maxWidth - padding; startY = padding; break;
          case 'bottom-left': startX = padding; startY = canvas.height - padding - lineHeight*(lines.length-1); break;
          case 'bottom-right': startX = canvas.width - maxWidth - padding; startY = canvas.height - padding - lineHeight*(lines.length-1); break;
          case 'center': 
            startX = (canvas.width - maxWidth)/2; 
            startY = (canvas.height - lineHeight*lines.length)/2; 
            break;
        }
      } else {
        startX = parseInt(customX.value) || 100;
        startY = parseInt(customY.value) || 100;
      }

      lines.forEach((line, i) => {
        const y = startY + i * lineHeight;
        if (rotation !== 0) {
          ctx.save();
          ctx.translate(startX, y);
          ctx.rotate(rotation * Math.PI / 180);
          ctx.fillText(line, 0, 0);
          ctx.restore();
        } else {
          ctx.fillText(line, startX, y);
        }
      });

      currentWatermarked = canvas.toDataURL('image/jpeg', 0.92);
      previewImg.src = currentWatermarked;
    }

    applyBtn.addEventListener('click', applyWatermark);

    downloadBtn.addEventListener('click', () => {
      if (!currentWatermarked) return alert('請先上傳圖片並套用水印');
      const link = document.createElement('a');
      link.download = `watermarked.jpg`;
      link.href = currentWatermarked;
      link.click();
    });

    document.querySelectorAll('input, select, textarea').forEach(el => {
      el.addEventListener('input', () => { if (originalImage) applyWatermark(); });
    });
  </script>
</body>
</html>
