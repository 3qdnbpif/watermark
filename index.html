<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片加水印工具</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .main {
      padding: 25px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 25px;
    }
    .preview-area {
      text-align: center;
    }
    .preview {
      max-width: 100%;
      max-height: 550px;
      border: 3px solid #eee;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .controls {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #eee;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    input[type="text"], select, input[type="color"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    input[type="range"] {
      width: 100%;
    }
    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-primary { background: #0066ff; color: white; }
    .btn-primary:hover { background: #0052cc; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    footer {
      text-align: center;
      padding: 15px;
      color: #666;
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📸 圖片加水印工具</h1>
      <p>上傳相片，自訂文字、水印位置、顏色等</p>
    </header>

    <div class="main">
      <!-- 預覽區 -->
      <div class="preview-area">
        <input type="file" id="upload" accept="image/*" style="margin-bottom:15px;">
        <img id="preview" class="preview" src="" alt="預覽圖片">
        <p id="status" style="margin-top:10px; color:#666;"></p>
      </div>

      <!-- 控制面板 -->
      <div class="controls">
        <label>水印文字</label>
        <input type="text" id="text" value="© 你的名字 2026" placeholder="輸入水印文字">

        <label>字體大小 <span id="sizeValue">40</span>px</label>
        <input type="range" id="size" min="12" max="150" value="40">

        <label>文字顏色</label>
        <input type="color" id="color" value="#ffffff">

        <label>透明度 <span id="opacityValue">70</span>%</label>
        <input type="range" id="opacity" min="10" max="100" value="70">

        <label>位置</label>
        <select id="position">
          <option value="bottom-right">右下角</option>
          <option value="bottom-left">左下角</option>
          <option value="top-right">右上角</option>
          <option value="top-left">左上角</option>
          <option value="center">正中間</option>
        </select>

        <label>旋轉角度 <span id="rotationValue">0</span>°</label>
        <input type="range" id="rotation" min="-45" max="45" value="0">

        <button class="btn-primary" id="applyBtn">套用水印（預覽）</button>
        <button class="btn-success" id="downloadBtn">💾 下載水印後圖片</button>
      </div>
    </div>

    <footer>
      純前端工具 • 所有處理喺你瀏覽器度完成 • 資料唔會上傳
    </footer>
  </div>

  <script>
    const upload = document.getElementById('upload');
    const previewImg = document.getElementById('preview');
    const textInput = document.getElementById('text');
    const sizeSlider = document.getElementById('size');
    const sizeValue = document.getElementById('sizeValue');
    const colorInput = document.getElementById('color');
    const opacitySlider = document.getElementById('opacity');
    const opacityValue = document.getElementById('opacityValue');
    const positionSelect = document.getElementById('position');
    const rotationSlider = document.getElementById('rotation');
    const rotationValue = document.getElementById('rotationValue');
    const applyBtn = document.getElementById('applyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let originalImage = null;
    let currentWatermarked = null;

    // 更新數值顯示
    sizeSlider.oninput = () => sizeValue.textContent = sizeSlider.value;
    opacitySlider.oninput = () => opacityValue.textContent = opacitySlider.value;
    rotationSlider.oninput = () => rotationValue.textContent = rotationSlider.value;

    // 上傳圖片
    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        previewImg.src = event.target.result;
        originalImage = new Image();
        originalImage.onload = () => {
          applyWatermark();
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // 套用水印
    function applyWatermark() {
      if (!originalImage) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = originalImage.width;
      canvas.height = originalImage.height;

      ctx.drawImage(originalImage, 0, 0);

      const text = textInput.value || 'Watermark';
      const fontSize = parseInt(sizeSlider.value);
      const opacity = parseInt(opacitySlider.value) / 100;
      const color = colorInput.value;
      const rotation = parseInt(rotationSlider.value);

      ctx.font = `bold ${fontSize}px Arial`;
      ctx.fillStyle = color;
      ctx.globalAlpha = opacity;
      ctx.textBaseline = 'middle';

      // 計算位置
      let x, y;
      const padding = 40;
      const textWidth = ctx.measureText(text).width;

      switch(positionSelect.value) {
        case 'top-left':
          x = padding; y = padding + fontSize/2; break;
        case 'top-right':
          x = canvas.width - textWidth - padding; y = padding + fontSize/2; break;
        case 'bottom-left':
          x = padding; y = canvas.height - padding; break;
        case 'bottom-right':
          x = canvas.width - textWidth - padding; y = canvas.height - padding; break;
        case 'center':
          x = (canvas.width - textWidth) / 2; y = canvas.height / 2; break;
      }

      // 旋轉
      if (rotation !== 0) {
        ctx.save();
        ctx.translate(x + textWidth/2, y);
        ctx.rotate(rotation * Math.PI / 180);
        ctx.fillText(text, -textWidth/2, 0);
        ctx.restore();
      } else {
        ctx.fillText(text, x, y);
      }

      currentWatermarked = canvas.toDataURL('image/jpeg', 0.95);
      previewImg.src = currentWatermarked;
    }

    applyBtn.addEventListener('click', applyWatermark);

    // 下載
    downloadBtn.addEventListener('click', () => {
      if (!currentWatermarked) {
        alert('請先上傳圖片並套用水印');
        return;
      }
      const link = document.createElement('a');
      link.download = 'watermarked-image.jpg';
      link.href = currentWatermarked;
      link.click();
    });

    // 即時更新
    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('input', () => {
        if (originalImage) applyWatermark();
      });
    });
  </script>
</body>
</html>
